services:
  # Backend Service
  - type: web
    name: k9-backend
    env: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false # Set this in Render Dashboard (Pooler URL)
      - key: JWT_SECRET
        generateValue: true # Or set manually in Dashboard
      - key: PORT
        value: 10000

  # Frontend Service
  - type: static
    name: k9-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishDir: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: k9-backend
          property: url
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
